<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>N‑Queen Visualizer</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #0f172a;
      color: white;
    }

    h1 {
      margin-top: 20px;
    }

    #board {
      display: grid;
      margin: 30px auto;
      width: fit-content;
      border: 4px solid white;
    }

    .cell {
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: bold;
    }

    .white {
      background: #e2e8f0;
      color: black;
    }

    .black {
      background: #475569;
    }

    button, input {
      padding: 10px 16px;
      margin: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>

  <h1>👑 N‑Queen Visualizer</h1>

  <div>
    <input type="number" id="nInput" value="4" min="1" max="10" />
    <button onclick="startSolver()">Start Visualization</button>
  </div>

  <div id="board"></div>

  <script>
    let board = [];
    let n;

    function createBoard(size) {
      const boardDiv = document.getElementById("board");
      boardDiv.innerHTML = "";
      boardDiv.style.gridTemplateColumns = `repeat(${size}, 60px)`;

      board = Array(size).fill().map(() => Array(size).fill('.'));

      for (let i = 0; i < size; i++) {
        for (let j = 0; j < size; j++) {
          const cell = document.createElement("div");
          cell.id = `${i}-${j}`;
          cell.classList.add("cell");
          cell.classList.add((i + j) % 2 === 0 ? "white" : "black");
          boardDiv.appendChild(cell);
        }
      }
    }

    function drawQueen(row, col) {
      document.getElementById(`${row}-${col}`).innerText = "♛";
    }

    function removeQueen(row, col) {
      document.getElementById(`${row}-${col}`).innerText = "";
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function isSafe(row, col) {
      // column
      for (let i = 0; i < row; i++)
        if (board[i][col] === 'Q') return false;

      // left diagonal
      for (let i=row-1, j=col-1; i>=0 && j>=0; i--, j--)
        if (board[i][j] === 'Q') return false;

      // right diagonal
      for (let i=row-1, j=col+1; i>=0 && j<n; i--, j++)
        if (board[i][j] === 'Q') return false;

      return true;
    }

    async function solve(row) {
      if (row === n) return true;

      for (let col = 0; col < n; col++) {
        if (isSafe(row, col)) {
          board[row][col] = 'Q';
          drawQueen(row, col);
          await sleep(300);

          if (await solve(row + 1)) return true;

          board[row][col] = '.';
          removeQueen(row, col);
          await sleep(300);
        }
      }

      return false;
    }

    async function startSolver() {
      n = parseInt(document.getElementById("nInput").value);
      createBoard(n);
      await solve(0);
    }

    // initial board
    createBoard(4);
  </script>

</body>
</html>
